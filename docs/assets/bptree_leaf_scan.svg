<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="540" viewBox="0 0 1100 540" role="img" aria-labelledby="title desc">
  <title id="title">B+ 트리 탐색과 leaf scan</title>
  <desc id="desc">B+ 트리 internal node와 leaf node 구조, leaf next pointer를 이용한 범위 조회 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .internal { fill: #eef6ff; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .leaf { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 12; }
      .scan { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 12; }
      .key { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 5; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #374151; }
      .mono { font: 600 13px Consolas, monospace; fill: #1f2937; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .next { stroke: #059669; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .range { stroke: #f97316; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1100" height="540" />
  <text class="title" x="48" y="58">B+ 트리 탐색과 leaf scan</text>
  <text class="subtitle" x="48" y="86">exact lookup은 leaf 하나에서 끝나고, 범위 조회는 leaf의 next 포인터를 따라 오른쪽으로 진행한다.</text>

  <rect class="internal" x="462" y="126" width="176" height="72" />
  <text class="label" x="500" y="158">Internal</text>
  <rect class="key" x="494" y="168" width="46" height="22" />
  <text class="mono" x="508" y="184">100</text>
  <rect class="key" x="560" y="168" width="46" height="22" />
  <text class="mono" x="574" y="184">200</text>

  <rect class="internal" x="190" y="244" width="162" height="66" />
  <text class="label" x="229" y="273">Internal</text>
  <text class="mono" x="234" y="297">50</text>

  <rect class="internal" x="470" y="244" width="162" height="66" />
  <text class="label" x="509" y="273">Internal</text>
  <text class="mono" x="506" y="297">150</text>

  <rect class="internal" x="748" y="244" width="162" height="66" />
  <text class="label" x="787" y="273">Internal</text>
  <text class="mono" x="787" y="297">250</text>

  <path class="arrow" d="M488 198 C435 224 358 232 312 244" />
  <path class="arrow" d="M550 198 V244" />
  <path class="arrow" d="M612 198 C665 225 744 232 790 244" />

  <rect class="leaf" x="96" y="382" width="190" height="78" />
  <text class="label" x="160" y="410">Leaf</text>
  <text class="mono" x="120" y="436">10 | 30 | 50</text>

  <rect class="leaf" x="326" y="382" width="190" height="78" />
  <text class="label" x="390" y="410">Leaf</text>
  <text class="mono" x="350" y="436">90 | 120 | 150</text>

  <rect class="leaf" x="556" y="382" width="190" height="78" />
  <text class="label" x="620" y="410">Leaf</text>
  <text class="mono" x="580" y="436">160 | 180 | 200</text>

  <rect class="leaf" x="786" y="382" width="190" height="78" />
  <text class="label" x="850" y="410">Leaf</text>
  <text class="mono" x="812" y="436">230 | 260 | 300</text>

  <path class="arrow" d="M243 310 C220 336 204 352 194 382" />
  <path class="arrow" d="M292 310 C335 337 381 350 411 382" />
  <path class="arrow" d="M529 310 C497 335 458 350 430 382" />
  <path class="arrow" d="M574 310 C605 337 628 351 647 382" />
  <path class="arrow" d="M811 310 C782 336 738 352 696 382" />
  <path class="arrow" d="M857 310 C875 336 880 352 882 382" />

  <path class="next" d="M286 421 H326" />
  <path class="next" d="M516 421 H556" />
  <path class="next" d="M746 421 H786" />

  <rect class="scan" x="58" y="478" width="990" height="38" />
  <text class="small" x="80" y="502">예: game_win_count &gt; 150이면 150이 있는 leaf를 찾은 뒤, 조건에 맞는 key를 수집하면서 next 포인터로 오른쪽 leaf를 계속 스캔한다.</text>

  <path class="range" d="M420 468 C500 490 665 490 880 468" />
</svg>
